name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal reproducible steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser / OS / Node version
      placeholder: macOS 14, Chrome 124, Node 22

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste errors or attach screenshots.
